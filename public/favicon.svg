<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" width="100" height="100">
  <defs>
    <!-- Cyan glow filter -->
    <filter id="glow" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="3.5" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>
    <!-- Background gradient -->
    <linearGradient id="shieldGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#00f0ff" />
      <stop offset="50%" stop-color="#7b2cbf" />
      <stop offset="100%" stop-color="#9d4edd" />
    </linearGradient>
  </defs>
  <!-- Outer Diamond Border -->
  <polygon points="50,6 94,50 50,94 6,50" fill="#030712" stroke="url(#shieldGrad)" stroke-width="6.5" filter="url(#glow)" />
  <!-- Inner dashed guide line -->
  <polygon points="50,16 84,50 50,84 16,50" fill="none" stroke="#00f0ff" stroke-width="1.5" stroke-dasharray="3 3" opacity="0.6" />
  <!-- Styled Cybernetic 'S' -->
  <path d="M62,32 L42,32 L38,47 L62,53 L58,68 L38,68" 
        fill="none" stroke="#00f0ff" stroke-width="8.5" stroke-linecap="round" stroke-linejoin="round" filter="url(#glow)" />
  <!-- Shadow Monarch Purple Secondary Accent -->
  <path d="M50,18 L76,50 L50,82 L24,50 Z" fill="none" stroke="#9d4edd" stroke-width="1" opacity="0.4" />
</svg>